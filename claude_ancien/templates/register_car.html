<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enregistrer votre voiture - IoT Parking</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        padding: 40px;
        max-width: 500px;
        width: 100%;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .device-info {
        background: #f0f0f0;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 30px;
        border-left: 4px solid #667eea;
      }

      .device-info p {
        color: #666;
        font-size: 14px;
      }

      .device-id {
        font-weight: bold;
        color: #667eea;
        word-break: break-all;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      label {
        color: #333;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
      }

      input {
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        background-color: #f9f9f9;
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 14px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-top: 10px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #status {
        margin-top: 20px;
        padding: 15px;
        border-radius: 5px;
        font-size: 14px;
        display: none;
      }

      #status.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
        display: block;
      }

      #status.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        display: block;
      }

      .loading {
        display: none;
        text-align: center;
        color: #667eea;
      }

      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚗 Enregistrer votre voiture</h1>

      <div class="device-info">
        <p>Device ID:</p>
        <p class="device-id" id="deviceId">{{ device_id }}</p>
      </div>

      <form id="carForm">
        <div class="form-group">
          <label for="plate">Plaque immatriculation *</label>
          <input
            type="text"
            id="plate"
            name="plate"
            placeholder="ex: AB-123456"
            required
          />
        </div>

        <div class="form-group">
          <label for="make">Marque *</label>
          <input
            type="text"
            id="make"
            name="make"
            placeholder="ex: BMW, Mercedes"
            required
          />
        </div>

        <div class="form-group">
          <label for="model">Modèle *</label>
          <input
            type="text"
            id="model"
            name="model"
            placeholder="ex: X5, C-Class"
            required
          />
        </div>

        <div class="form-group">
          <label for="color">Couleur</label>
          <input
            type="text"
            id="color"
            name="color"
            placeholder="ex: Noir, Blanc"
          />
        </div>

        <div class="form-group">
          <label for="year">Année</label>
          <input
            type="number"
            id="year"
            name="year"
            placeholder="ex: 2023"
            min="1990"
            max="2099"
          />
        </div>

        <button type="submit" id="submitBtn">Enregistrer la voiture</button>
      </form>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Enregistrement en cours...</p>
      </div>

      <div id="status"></div>
    </div>

    <script>
      const deviceId = "{{ device_id }}";

      document
        .getElementById("carForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData.entries());
          data.device_id = deviceId;

          document.getElementById("submitBtn").disabled = true;
          document.getElementById("loading").style.display = "block";

          try {
            const res = await fetch("/register-car", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });

            const result = await res.json();
            document.getElementById("loading").style.display = "none";

            if (res.ok) {
              showStatus("✅ Voiture enregistrée avec succès!", "success");
              document.getElementById("carForm").reset();
            } else {
              showStatus("❌ " + (result.error || "Erreur"), "error");
              document.getElementById("submitBtn").disabled = false;
            }
          } catch (error) {
            document.getElementById("loading").style.display = "none";
            showStatus("❌ Erreur: " + error.message, "error");
            document.getElementById("submitBtn").disabled = false;
          }
        });

      function showStatus(message, type) {
        const statusEl = document.getElementById("status");
        statusEl.innerText = message;
        statusEl.className = type;
      }
    </script>
  </body>
</html>
